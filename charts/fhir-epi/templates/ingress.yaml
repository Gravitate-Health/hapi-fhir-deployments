{{- if and .Values.virtualService.enabled .Values.ingress.enabled }}
{{- fail "virtualService.enabled and ingress.enabled are mutually exclusive; set only one to true." }}
{{- end }}
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "fhir-epi.fullname" . }}
  labels:
    {{- include "fhir-epi.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - {{- if and .host (ne .host "*") }}
      host: {{ .host | quote }}
      {{- end }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ $.Values.hapi.fullnameOverride }}
                port:
                  number: {{ $.Values.hapi.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
