{{/*
Auto-generated PostgreSQL credentials secret.

Uses Helm's `lookup` function so the password is preserved across upgrades
(idempotent). The annotation `helm.sh/resource-policy: keep` prevents
`helm uninstall` from deleting the credentials.

The secret name is controlled by `.Values.postgresql.auth.existingSecret`.
*/}}
{{- if .Values.postgresql.enabled }}
{{- $secretName := .Values.postgresql.auth.existingSecret }}
{{- if not $secretName }}
{{- fail "postgresql.auth.existingSecret must be set (or postgresql.enabled must be false)" }}
{{- end }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $password := "" }}
{{- $pgPassword := "" }}
{{- if and $existing $existing.data }}
  {{- $password   = index $existing.data "password"          | b64dec }}
  {{- $pgPassword = index $existing.data "postgres-password" | b64dec }}
{{- else }}
  {{- $password   = randAlphaNum 32 }}
  {{- $pgPassword = randAlphaNum 32 }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fhir-ips.labels" . | nindent 4 }}
  annotations:
    # Keep credentials when the release is uninstalled so the PVC data remains accessible.
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  password: {{ $password }}
  postgres-password: {{ $pgPassword }}
{{- end }}
